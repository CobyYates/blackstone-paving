# Cloudflare Pages configuration.
# The Nitro `cloudflare-pages` preset builds to ./dist (static assets + _worker.js).
#
# Deploy options:
#   1) Git integration (recommended): connect the repo in the Cloudflare dashboard.
#        Build command:            npm run build
#        Build output directory:   dist
#        Set the NUXT_* env vars under Settings → Environment variables.
#   2) Direct upload from your machine:  npm run cf:deploy

name = "blackstone-paving"
compatibility_date = "2025-07-01"
# Required for Nitro's Node built-in polyfills on Workers/Pages.
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# No secrets / [vars] here on purpose. This site deploys via `npm run cf:deploy`
# from a developer machine: `nuxt build` reads your local (gitignored) .env and
# bakes the public config - Storyblok CDN token, EmailJS keys, site URL - into
# the uploaded output. So nothing sensitive is committed to git or stored in the
# Cloudflare dashboard. Copy .env.example -> .env and fill it in before deploying.
#
# (If you ever switch to Cloudflare's git push-to-deploy, the remote build can't
# see your local .env - you'd then define runtime NUXT_PUBLIC_* vars here under
# [vars] / [env.preview.vars], or as `wrangler pages secret put` secrets.)
