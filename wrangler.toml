# Cloudflare Pages configuration.
# The Nitro `cloudflare-pages` preset builds to ./dist (static assets + _worker.js).
#
# Deploy options:
#   1) Git integration (recommended): connect the repo in the Cloudflare dashboard.
#        Build command:            npm run build
#        Build output directory:   dist
#        Set the NUXT_* env vars under Settings → Environment variables.
#   2) Direct upload from your machine:  npm run cf:deploy

name = "blackstone-paving"
compatibility_date = "2025-07-01"
# Required for Nitro's Node built-in polyfills on Workers/Pages.
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# No secrets / [vars] here on purpose - nothing sensitive is committed to git.
#
# This project uses Cloudflare git push-to-deploy. The remote build can't see a
# local .env, so config is supplied as encrypted Pages SECRETS (stored in
# Cloudflare, not git, not the plaintext vars UI). Because pages render via edge
# SSR, these runtime values reach the browser through the SSR payload. Set them
# once (values are public - Storyblok CDN token / EmailJS keys - but kept out of
# git as a matter of hygiene):
#
#   npx wrangler pages secret put NUXT_PUBLIC_STORYBLOK_ACCESS_TOKEN
#   npx wrangler pages secret put NUXT_PUBLIC_EMAILJS_SERVICE_ID
#   npx wrangler pages secret put NUXT_PUBLIC_EMAILJS_TEMPLATE_ID
#   npx wrangler pages secret put NUXT_PUBLIC_EMAILJS_PUBLIC_KEY
#
# then re-run the deployment. Preview deployments use a separate secret store;
# set the same keys for Preview in the dashboard if you use branch previews.
#
# Alternative: deploy from your machine with `npm run cf:deploy`, which bakes the
# local .env into the build instead (then disable git auto-builds so they don't
# overwrite it with a token-less build).
